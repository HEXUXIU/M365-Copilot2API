<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="referrer" content="no-referrer"><title>M365 Copilot2API · 登录</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@latest"></script><style>:root{color-scheme:light dark;--bg:#f5f5f7;--surface:rgba(255,255,255,0.72);--surface-border:rgba(255,255,255,0.5);--line:rgba(0,0,0,0.08);--text:#1d1d1f;--muted:#86868b;--primary:#1d1d1f;--primary-hover:#000;--accent:#0071e3;--red:#ff3b30;--green:#34c759;--shadow:0 8px 40px rgba(0,0,0,0.08);--shadow-lg:0 24px 60px rgba(0,0,0,0.12);--radius:14px;--radius-sm:8px;--ease-out:cubic-bezier(0.23,1,0.32,1);--ease-in-out:cubic-bezier(0.77,0,0.175,1)}@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--surface:rgba(44,44,46,0.8);--surface-border:rgba(255,255,255,0.08);--line:rgba(255,255,255,0.1);--text:#f5f5f7;--muted:#98989d;--primary:#f5f5f7;--primary-hover:#fff;--accent:#0a84ff;--shadow:0 8px 40px rgba(0,0,0,0.3);--shadow-lg:0 24px 60px rgba(0,0,0,0.4)}}*{box-sizing:border-box;margin:0}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;font-size:15px;line-height:1.4706;-webkit-font-smoothing:antialiased;animation:fadeIn 0.5s var(--ease-out)}@keyframes fadeIn{from{opacity:0}}@keyframes slideUp{from{opacity:0;transform:translateY(12px)}}@keyframes spin{to{transform:rotate(360deg)}}.card{width:min(400px,calc(100vw - 32px));background:var(--surface);-webkit-backdrop-filter:blur(40px) saturate(180%);backdrop-filter:blur(40px) saturate(180%);border:1px solid var(--surface-border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow-lg);animation:slideUp 0.6s var(--ease-out) 0.1s both}.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:600;letter-spacing:-0.01em;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:28px;color:var(--text)}.brand i{display:inline-block;width:22px;height:22px;border-radius:5px;background:conic-gradient(from 0deg,#f25022 0 25%,#7fba00 25% 50%,#00a4ef 50% 75%,#ffb900 75% 100%);flex-shrink:0}h1{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;color:var(--text)}p{color:var(--muted);font-size:14px;margin:0 0 24px;line-height:1.5}.warning{padding:12px 14px;background:rgba(255,59,48,0.08);border:1px solid rgba(255,59,48,0.2);color:var(--red);margin-bottom:20px;font-size:13px;border-radius:var(--radius-sm);line-height:1.5}.warning code{font-weight:600}.field{margin:20px 0}.field:first-of-type{margin-top:0}label{display:block;font-weight:500;font-size:13px;margin-bottom:8px;color:var(--text)}.password-wrap{position:relative}.password-wrap input{padding-right:40px}.password-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--muted);cursor:pointer;padding:4px 6px;margin:0;width:auto;font-size:15px;line-height:1;border-radius:6px;min-height:auto;transition:color 0.2s ease}.password-toggle:hover{color:var(--text);background:transparent;box-shadow:none}input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font:inherit;font-size:15px;background:rgba(255,255,255,0.5);color:var(--text);outline:0;transition:border-color 0.2s ease,box-shadow 0.2s ease,background 0.2s ease}@media(prefers-color-scheme:dark){input{background:rgba(0,0,0,0.2)}}input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,0.15);background:rgba(255,255,255,0.7)}@media(prefers-color-scheme:dark){input:focus{background:rgba(0,0,0,0.3);box-shadow:0 0 0 3px rgba(10,132,255,0.2)}}input::placeholder{color:var(--muted)}button{width:100%;border:0;background:var(--primary);color:var(--bg);padding:10px 16px;margin-top:20px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);transition:background 0.2s ease,transform 0.15s var(--ease-out),box-shadow 0.2s ease;position:relative;overflow:hidden;min-height:44px}button:hover{background:var(--primary-hover);box-shadow:var(--shadow)}button:active{transform:scale(0.97)}button:disabled{cursor:not-allowed;opacity:0.5;transform:none!important;box-shadow:none!important}button.loading{color:transparent;pointer-events:none}button.loading::after{content:"";position:absolute;inset:0;margin:auto;width:20px;height:20px;border:2.5px solid var(--bg);border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite}.error{color:var(--red);font-size:13px;margin-top:12px;min-height:20px;transition:opacity 0.2s ease}[hidden]{display:none!important}#login,#change{animation:slideUp 0.5s var(--ease-out) 0.15s both}@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}</style></head><body><main class="card"><div class="brand"><i></i>M365 Copilot2API</div><section id="login"><h1>管理员登录</h1><p>请输入管理员密码以进入控制台。</p><div class="warning">默认密码：<code>admin123</code><br>首次登录后请立即修改管理员密码。</div><form id="loginForm"><div class="field"><label for="password">管理员密码</label><div class="password-wrap"><input id="password" type="password" autocomplete="current-password" required autofocus><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="切换密码可见性"><i data-lucide="eye" style="width:18px;height:18px;display:flex"></i></button></div></div><button id="loginBtn">登录</button></form><div class="error" id="loginError"></div></section><section id="change" hidden><h1>必须立即修改默认密码</h1><div class="warning">当前仍在使用初始密码。为了保护账号池、OAuth 凭据和 API Key，在设置新密码前不能进入任何管理功能。</div><form id="changeForm"><div class="field"><label for="current">当前密码</label><div class="password-wrap"><input id="current" type="password" autocomplete="current-password" required><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="切换密码可见性"><i data-lucide="eye" style="width:18px;height:18px;display:flex"></i></button></div></div><div class="field"><label for="next">新密码（至少 6 个字符）</label><div class="password-wrap"><input id="next" type="password" autocomplete="new-password" minlength="6" required><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="切换密码可见性"><i data-lucide="eye" style="width:18px;height:18px;display:flex"></i></button></div></div><div class="field"><label for="confirm">再次输入新密码</label><div class="password-wrap"><input id="confirm" type="password" autocomplete="new-password" minlength="6" required><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="切换密码可见性"><i data-lucide="eye" style="width:18px;height:18px;display:flex"></i></button></div></div><button id="changeBtn">修改密码并重新登录</button></form><div class="error" id="changeError"></div></section></main><script>try{lucide.createIcons()}catch(e){}const $=id=>document.getElementById(id);function togglePassword(btn){const ico=btn.querySelector('[data-lucide]');const inp=btn.previousElementSibling;const isPassword=inp.type==='password';inp.type=isPassword?'text':'password';if(ico){try{ico.setAttribute('data-lucide',isPassword?'eye-off':'eye');lucide.createIcons()}catch(e){}}}function setLoading(btn,loading){if(loading){btn.disabled=true;btn.classList.add('loading')}else{btn.disabled=false;btn.classList.remove('loading')}}async function request(url,body){const r=await fetch(url,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),raw=await r.text();let d={};try{d=JSON.parse(raw)}catch{}if(!r.ok){const e=new Error(d?.error?.message||raw||'请求失败');e.status=r.status;throw e}return d}function requireChange(current=''){$('login').hidden=true;$('change').hidden=false;if(current){$('current').value=current;}$('next').focus()}$('loginForm').addEventListener('submit',async e=>{e.preventDefault();$('loginError').textContent='';const password=$('password').value;if(!password)return;setLoading($('loginBtn'),true);try{const d=await request('/api/admin/login',{password});if(d.must_change_password)requireChange(password);else location.replace('/')}catch(x){$('loginError').textContent=x.status===429?'失败次数过多，请稍后再试。':x.message}finally{setLoading($('loginBtn'),false)}});$('changeForm').addEventListener('submit',async e=>{e.preventDefault();$('changeError').textContent='';if($('next').value!==$('confirm').value){$('changeError').textContent='两次输入的新密码不一致';return}if($('next').value.length<6){$('changeError').textContent='新密码至少需要 6 个字符';return}setLoading($('changeBtn'),true);try{await request('/api/admin/change-password',{current_password:$('current').value,new_password:$('next').value});alert('密码修改成功。所有旧会话已失效，请使用新密码重新登录。');location.replace('/')}catch(x){$('changeError').textContent=x.message}finally{setLoading($('changeBtn'),false)}});fetch('/api/admin/session',{credentials:'same-origin'}).then(r=>r.json()).then(d=>{if(d.authenticated&&d.must_change_password){$("login").hidden=true;$("change").hidden=false;$("next").focus()}else if(d.authenticated)location.replace('/')}).catch(()=>{});</script></body></html>
